<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân - Sách Đẳng cấp</title>
    <link rel="stylesheet" href="/css/style.css?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .profile-layout {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
        }

        .profile-card {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            padding: 2rem;
            box-shadow: var(--shadow-md);
        }

        /* Identity Card (Left) */
        .identity-card {
            flex: 1;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            height: fit-content;
        }

        .avatar-placeholder {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .profile-role {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .profile-email {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .profile-meta {
            width: 100%;
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
        }

        .meta-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .meta-label {
            color: var(--text-muted);
            font-size: 0.9em;
        }

        .status-active {
            color: var(--success-color);
            background: rgba(52, 211, 153, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }

        /* Action Card (Right) */
        .action-card {
            flex: 2;
        }

        .card-header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .card-header h3 {
            margin-bottom: 0.5rem;
            font-size: 1.25rem;
        }

        .card-header p {
            color: var(--text-muted);
            font-size: 0.9em;
            margin: 0;
        }

        .form-row {
            display: block;
        }

        .form-row .form-group {
            flex: 1;
        }

        .input-wrapper {
            position: relative;
        }

        .form-actions {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 12px 30px;
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            .profile-layout {
                flex-direction: column;
            }

            .identity-card {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="brand">Sách Đẳng cấp</a>
            <div class="nav-links" id="nav-links">
                <!-- Javascript will load links here -->
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="profile-layout">
            <!-- Left Column: Identity -->
            <div class="profile-card identity-card">
                <div class="avatar-placeholder">
                    <span id="avatar-initial">U</span>
                </div>
                <h2 id="user-role-display" class="profile-role">User</h2>
                <p id="user-email" class="profile-email">Loading...</p>
                <div class="profile-meta">
                    <div class="meta-item">
                        <span class="meta-label">Trạng thái</span>
                        <span class="meta-value status-active">Hoạt động</span>
                    </div>
                </div>
            </div>

            <!-- Right Column: Actions -->
            <div class="profile-card action-card">
                <div class="card-header">
                    <h3>Bảo mật & Mật khẩu</h3>
                    <p>Quản lý mật khẩu để bảo vệ tài khoản của bạn</p>
                </div>

                <div id="password-alert" class="alert" style="display: none;"></div>

                <form id="change-password-form" class="modern-form">
                    <div class="form-group">
                        <label for="current-password">Mật khẩu hiện tại</label>
                        <div class="input-wrapper">
                            <input type="password" id="current-password" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="new-password">Mật khẩu mới</label>
                            <input type="password" id="new-password" placeholder="••••••••" required>
                        </div>
                        <div class="form-group">
                            <label for="confirm-password">Xác nhận mật khẩu</label>
                            <input type="password" id="confirm-password" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script src="/js/profile.js"></script>
</body>

</html>
